name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 UTC — catches CVEs published while no PR is open
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub Advanced Security (code scanning) is not available on this
    # private repo's plan, so the SARIF upload fails on every run with
    # "Code scanning is not enabled for this repository" and paints every
    # commit/PR red. Non-blocking until GHAS is enabled (or the repo goes
    # public), at which point real findings fail the run again.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
