name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v4
        with:
          # Fail the build if any dep introduces a CVE at this severity or higher
          fail-on-severity: high
          # HIPAA-aligned license stance — refuse GPL/AGPL deps that would
          # virally infect our proprietary code with copyleft obligations
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later
          comment-summary-in-pr: on-failure
