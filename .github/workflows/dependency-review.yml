name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The dependency-review API requires the dependency graph + GitHub
    # Advanced Security, which this private repo's plan does not include —
    # the action fails on every PR with "Dependency review is not supported
    # on this repository". Non-blocking until GHAS is enabled (or the repo
    # goes public), at which point CVE/license findings fail the run again.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
        with:
          # Fail the build if any dep introduces a CVE at this severity or higher
          fail-on-severity: high
          # HIPAA-aligned license stance — refuse GPL/AGPL deps that would
          # virally infect our proprietary code with copyleft obligations
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later
          comment-summary-in-pr: on-failure
