name: production-smoke

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: production-smoke
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  health:
    name: production health probes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RAYHEALTH_PROD_ORIGIN: ${{ vars.RAYHEALTH_PROD_ORIGIN }}
    steps:
      - name: Probe liveness, database, and audit health
        shell: bash
        run: |
          set -euo pipefail

          origin="${RAYHEALTH_PROD_ORIGIN:-https://rayhealthevv.com}"
          origin="${origin%/}"

          # Each probe gets three attempts with backoff. The first request after
          # a quiet period routinely catches a serverless/Neon cold start (a
          # slow response or a transient 503 while compute resumes); a real
          # outage still fails because all three attempts fail. Observed cold
          # start: first hit 503 after ~5s, immediate 200s afterwards.
          probe() {
            local name="$1"
            local path="$2"
            local out="$3"
            local attempt
            for attempt in 1 2 3; do
              echo "Probing ${name} (attempt ${attempt}/3): ${origin}${path}"
              if curl --fail --silent --show-error --max-time 20 \
                --header 'accept: application/json' \
                "${origin}${path}" \
                --output "${out}"; then
                return 0
              fi
              if [ "${attempt}" -lt 3 ]; then
                echo "::notice::${name} probe attempt ${attempt} failed (cold start?); retrying in $((attempt * 5))s"
                sleep $((attempt * 5))
              fi
            done
            echo "::error::${name} probe failed after 3 attempts"
            return 1
          }

          probe "liveness" "/api/health" "health.json"
          node -e "const fs=require('node:fs'); const body=JSON.parse(fs.readFileSync('health.json','utf8')); if (body.status !== 'ok') { console.error(body); process.exit(1); }"

          probe "database" "/api/health/db" "health-db.json"
          node -e "const fs=require('node:fs'); const body=JSON.parse(fs.readFileSync('health-db.json','utf8')); if (body.status !== 'ok') { console.error(body); process.exit(1); }"

          probe "audit" "/api/health/audit" "health-audit.json"
          node -e "const fs=require('node:fs'); const body=JSON.parse(fs.readFileSync('health-audit.json','utf8')); const allowed=new Set(['ok','stale','empty']); if (!allowed.has(body.status)) { console.error(body); process.exit(1); } if (body.status !== 'ok') { console.log('::warning::Audit health is ' + body.status + '. Review whether production traffic has been quiet or audit ingestion is stale.'); }"
