name: Secret Scan (gitleaks)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan every prior commit, not just
          # the latest. Required to catch secrets that landed in earlier
          # commits and were never rotated.
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Soft-fail on schedule runs (we still see the report); hard-fail
          # on PRs and direct pushes to main.
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'
