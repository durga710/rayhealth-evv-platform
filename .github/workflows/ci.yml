name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only — individual jobs upgrade as needed
permissions:
  contents: read

env:
  NODE_VERSION: '22'
  # Reproducible builds, no surprise locale numeric formatting
  LC_ALL: C
  CI: 'true'

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for tooling that inspects prior commits
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run security:scan

  test-core:
    name: test-core
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx vitest run
        working-directory: packages/core

  test-app:
    name: test-app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Tests rely on this being set; the in-test secret is fine for CI
      JWT_SECRET: ci-jwt-secret-not-used-in-prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx vitest run
        working-directory: packages/app

  test-web:
    name: test-web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx vitest run
        working-directory: packages/web

  e2e:
    name: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typecheck, lint, test-web]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: packages/web
      - name: Build web app
        run: npm run build --workspace=@rayhealth/web
      - name: Serve built dist and run e2e
        run: |
          npx serve -s packages/web/dist -p 4173 --no-port-switching &
          # Wait for the server to be ready
          npx wait-on http://localhost:4173 --timeout 30000
          npm run e2e --workspace=@rayhealth/web
        env:
          E2E_BASE_URL: 'http://localhost:4173'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7

  mobile-e2e:
    name: mobile-e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: packages/mobile
      - name: Run mobile Expo web smoke
        run: npm run e2e --workspace=@rayhealth/mobile
      - name: Upload mobile Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-playwright-report
          path: packages/mobile/playwright-report/
          retention-days: 7
