name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only — individual jobs upgrade as needed
permissions:
  contents: read

env:
  NODE_VERSION: '22'
  # Reproducible builds, no surprise locale numeric formatting
  LC_ALL: C
  CI: 'true'

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history for tooling that inspects prior commits
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run security:scan
      - name: No string-built SQL (parameterized-query guard)
        run: npm run sql:scan

  test-core:
    name: test-core
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx vitest run
        working-directory: packages/core

  test-app:
    name: test-app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Tests rely on this being set; the in-test secret is fine for CI
      JWT_SECRET: ci-jwt-secret-not-used-in-prod
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx vitest run
        working-directory: packages/app

  test-web:
    name: test-web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx vitest run
        working-directory: packages/web
