<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RayHealth EVV — Progress Tracker</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #f97316;
    --accent-dim: rgba(249,115,22,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.13);
    --yellow: #eab308;
    --yellow-dim: rgba(234,179,8,0.13);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.13);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.13);
    --text: #e6edf3;
    --muted: #7d8590;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a0f05 0%, #0d1117 60%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 1.5rem;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 1.5rem; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 0.75rem; }
  .brand-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent) 0%, #dc2626 100%);
    border-radius: 10px; display: grid; place-items: center;
    font-size: 1.25rem; font-weight: 900; color: white; flex-shrink: 0;
  }
  h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.8rem; margin-top: 0.1rem; }
  .header-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(34,197,94,0.3);
    padding: 0.3rem 0.75rem; border-radius: 999px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,0.25);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.25); }
    50% { box-shadow: 0 0 0 6px rgba(34,197,94,0.1); }
  }
  .updated { color: var(--muted); font-size: 0.75rem; }
  .prod-link { color: var(--accent); font-size: 0.75rem; text-decoration: none; }
  .prod-link:hover { text-decoration: underline; }

  .summary {
    max-width: 1200px; margin: 1.5rem auto; padding: 0 2.5rem;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
    display: flex; flex-direction: column; gap: 0.3rem;
  }
  .stat-label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 1.75rem; font-weight: 800; }
  .stat-value.green { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--blue); }

  main { max-width: 1200px; margin: 0 auto; padding: 0 2.5rem 4rem; }

  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
  .filter-btn {
    padding: 0.35rem 0.9rem; border-radius: 999px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 0.78rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; font-family: var(--font);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .sections { display: flex; flex-direction: column; gap: 1.25rem; }

  .section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 1.25rem; cursor: pointer; user-select: none;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .section-header:hover { background: rgba(255,255,255,0.03); }
  .section-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: grid; place-items: center; font-size: 1rem; flex-shrink: 0;
    background: rgba(255,255,255,0.04);
  }
  .section-title { font-weight: 700; font-size: 0.92rem; flex: 1; }
  .section-progress { display: flex; align-items: center; gap: 0.75rem; }
  .section-fraction { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .prog-bar { width: 90px; height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .prog-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), #dc2626); transition: width 0.4s;
  }
  .prog-fill.all-green { background: linear-gradient(90deg, #16a34a, var(--green)); }
  .chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; flex-shrink: 0; }
  .section.open .chevron { transform: rotate(180deg); }
  .section-body { display: none; padding: 0.75rem 1.25rem 1rem; }
  .section.open .section-body { display: block; }

  .items { display: flex; flex-direction: column; gap: 0.35rem; }
  .item {
    display: flex; align-items: flex-start; gap: 0.75rem;
    padding: 0.6rem 0.75rem; border-radius: 8px; transition: background 0.12s;
  }
  .item:hover { background: rgba(255,255,255,0.03); }
  .item-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
  }
  .item-dot.live    { background: var(--green);  box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
  .item-dot.partial { background: var(--yellow); box-shadow: 0 0 0 3px rgba(234,179,8,0.2); }
  .item-dot.blocked { background: var(--red);    box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }
  .item-dot.todo    { background: var(--border); }
  .item-content { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; font-size: 0.88rem; }
  .item-note { color: var(--muted); font-size: 0.78rem; margin-top: 0.1rem; }
  .item-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.3rem; }
  .badge {
    font-size: 0.67rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    padding: 0.15rem 0.5rem; border-radius: 4px;
  }
  .badge.new   { background: var(--accent-dim); color: var(--accent); }
  .badge.owner { background: var(--blue-dim); color: var(--blue); }

  .legend {
    display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.25rem;
    padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; width: fit-content;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  @media (max-width: 640px) {
    header { padding: 1.5rem 1.25rem 1rem; }
    .summary, main { padding-left: 1.25rem; padding-right: 1.25rem; }
    .prog-bar { width: 60px; }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>

    </div>
    <div class="header-meta">

      <div class="updated">Last updated: 2026-05-18</div>
      <a class="prod-link" href="https://rayhealthevv.com" target="_blank">rayhealthevv.com ↗</a>
    </div>

</header>

<div class="summary" id="summary"></div>

<main>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Live in production</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Built / needs config</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Blocked</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Planned</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('live',this)">Live</button>
    <button class="filter-btn" onclick="setFilter('partial',this)">In Progress</button>
    <button class="filter-btn" onclick="setFilter('blocked',this)">Blocked</button>
    <button class="filter-btn" onclick="setFilter('todo',this)">Planned</button>

  <div class="sections" id="sections"></div>

let activeFilter = 'all';

function countAll() {
  let live=0, partial=0, blocked=0, todo=0;
  SECTIONS.forEach(s => s.items.forEach(i => {
    if      (i.status==='live')    live++;
    else if (i.status==='partial') partial++;
    else if (i.status==='blocked') blocked++;
    else                           todo++;
  }));
  return { live, partial, blocked, todo, total: live+partial+blocked+todo };
}

function renderSummary() {
  const { live, partial, blocked, todo, total } = countAll();
  const pct = Math.round(live / total * 100);
  document.getElementById('summary').innerHTML = `
    <div class="stat-card"><div class="stat-label">Live in Prod</div><div class="stat-value green">${live}</div></div>
    <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value yellow">${partial}</div></div>
    <div class="stat-card"><div class="stat-label">Blocked</div><div class="stat-value red">${blocked}</div></div>
    <div class="stat-card"><div class="stat-label">Planned</div><div class="stat-value" style="color:var(--muted)">${todo}</div></div>
    <div class="stat-card"><div class="stat-label">Overall Progress</div><div class="stat-value blue">${pct}%</div></div>
  `;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSections();
}

function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  SECTIONS.forEach(section => {
    const visibleItems = activeFilter === 'all'
      ? section.items
      : section.items.filter(i => i.status === activeFilter);
    if (visibleItems.length === 0) return;

    const live = section.items.filter(i => i.status === 'live').length;
    const total = section.items.length;
    const pct = Math.round(live / total * 100);
    const allGreen = live === total;

    const div = document.createElement('div');
    div.className = 'section open';
    div.innerHTML = `
      <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="section-icon">${section.icon}</div>
        <div class="section-title">${section.title}</div>
        <div class="section-progress">
          <div class="section-fraction">${live}/${total} live</div>
          <div class="prog-bar"><div class="prog-fill${allGreen?' all-green':''}" style="width:${pct}%"></div></div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="section-body">
        <div class="items">${visibleItems.map(renderItem).join('')}</div>
      </div>
    `;
    container.appendChild(div);
  });
}

function renderItem(item) {
  const badges = (item.badges||[]).map(b =>
    `<span class="badge ${b}">${b==='new'?'New this sprint':b==='owner'?'Owner action':b}</span>`
  ).join('');
  return `
    <div class="item">
      <div class="item-dot ${item.status}"></div>
      <div class="item-content">
        <div class="item-name">${item.name}</div>
        ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        ${badges ? `<div class="item-badges">${badges}</div>` : ''}
      </div>
    </div>
  `;
}
