# shots.yaml
#
# Single source of truth for every Seedance generation request across all six
# marketing spots. generate_clips.py reads this and submits one request per shot.
#
# Schema:
#   spot: 1..6
#   id:   stable identifier for the shot — used as the output filename
#   duration_s: target clip length (Seedance Pro supports 5 or 10s; Lite 5s)
#   resolution: 1920x1080 (16:9) or 1080x1920 (9:16) for vertical Reels/TikTok variants
#   prompt: the Seedance text prompt
#   negative_prompt: things to actively avoid (helps avoid common Seedance failure modes)

shots:
  # ----------------- Spot 1: Hero -----------------

  - spot: 1
    id: s1-shot1-walkup
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      A home-care worker in light blue scrubs and a light jacket walks up to a modest suburban
      front door, holding a smartphone. Late afternoon golden light. Warm but not sentimental.
      Documentary-style handheld camera. Photorealistic, natural skin tones.
    negative_prompt: "cartoon, illustration, animation, oversaturated, fake smile, stock photo"

  - spot: 1
    id: s1-shot2-dashboard
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Over-the-shoulder shot of a person scrolling a clean light-blue admin dashboard on a 13-inch
      laptop. The dashboard shows cards labeled Schedule, Visits, and Alerts. Slow smooth scroll
      from top to bottom. Minimalist office, soft daylight from a window. Realistic.
    negative_prompt: "text gibberish, illegible UI, fake screens, garbled fonts"

  - spot: 1
    id: s1-shot3-checkin
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Macro close-up of a smartphone screen showing a Clock In confirmation with a small green
      map pin and a Verified label. Fingers tap the screen briefly. Shallow depth of field.
      Soft front-door porch light. Photorealistic.
    negative_prompt: "blurry text, garbled UI, unrealistic finger anatomy"

  - spot: 1
    id: s1-shot4-formfill
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Top-down view of a tablet on a desk. Form fields populate themselves in real time with a
      subtle highlight animation. Clean white background. No hands. Soft daylight.
    negative_prompt: "text gibberish, jumbled letters, fake forms"

  - spot: 1
    id: s1-shot5-audit
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Macro close-up of a dark navy admin screen. A new audit log row appears at the top of a
      list with a small green check icon, then settles into place. Monospace text. Minimal UI.
    negative_prompt: "garbled text, illegible code, oversaturated"

  - spot: 1
    id: s1-shot6-client-warmth
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Wide shot of an elderly woman in her 70s laughing quietly with a caregiver in scrubs
      sitting next to her in a sunlit living room. Naturalistic, warm, real. No staged smiles.
    negative_prompt: "fake smile, stock photo, overlit, cartoon"

  # ----------------- Spot 2: Agency Owner -----------------

  - spot: 2
    id: s2-shot1-tired-owner
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      A tired-looking woman in her 40s at a cluttered home office desk, head in hands. Only the
      screen glow lights her face. Late evening. Documentary realism. Naturalistic.
    negative_prompt: "stock photo, fake despair, oversaturated"

  - spot: 2
    id: s2-shot2-paperwork
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Quick cuts of paperwork: a paper form with red-ink corrections, a signature page being
      signed under fluorescent light, a thick audit binder with sticky notes on the edges.
      Cinema verité. Naturalistic indoor light.
    negative_prompt: "text gibberish, fake paperwork"

  - spot: 2
    id: s2-shot3-clean-dashboard
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      A clean modern admin dashboard UI on a 27-inch monitor in a tidy office. Soft morning
      daylight from a window. Cards gently rearrange themselves in a subtle smooth animation.
      No hands visible.
    negative_prompt: "garbled UI, illegible text, harsh fluorescent"

  - spot: 2
    id: s2-shot4-relieved-owner
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Same woman as the first shot, now in a sunlit home office, holding a coffee mug, smiling
      slightly at her laptop screen. Morning light. Composed and calm.
    negative_prompt: "fake smile, stock photo, theatrical"

  - spot: 2
    id: s2-shot5-splitscreen-prep
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Outdoor wide shot — a caregiver standing on a residential porch taps their smartphone to
      clock in. Morning light. Natural posture.
    negative_prompt: "staged pose, fake smile, oversaturated"

  # ----------------- Spot 3: Caregiver -----------------

  - spot: 3
    id: s3-shot1-arrival
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      A young woman in light blue scrubs and a light jacket gets out of a Honda Civic in a
      suburban driveway. Morning autumn light, dry leaves on the ground. Natural and unposed.
    negative_prompt: "stock photo, staged smile, oversaturated"

  - spot: 3
    id: s3-shot2-walkup
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Same caregiver from previous shot walks up a modest concrete front path to a single-story
      home, phone in her right hand, friendly relaxed expression. Mid-morning light.
    negative_prompt: "fake smile, stock photo, dramatic lighting"

  - spot: 3
    id: s3-shot3-tap-in
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Macro of a smartphone screen showing a Clock In button being tapped, then a green
      confirmation with map pin appearing. Soft front-door porch light. Photorealistic.
    negative_prompt: "garbled UI, jumbled text"

  - spot: 3
    id: s3-shot4-care-moment
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Cinema verité of a caregiver helping an elderly man stand up from a wooden armchair, both
      smiling naturally. Sunlit living room. Real, warm, unstaged.
    negative_prompt: "fake smile, stock photo, theatrical, overlit"

  - spot: 3
    id: s3-shot5-walk-back
    duration_s: 10
    resolution: 1920x1080
    prompt: >
      The caregiver walking back to her car at end of a visit. Late afternoon golden hour. Her
      expression is relaxed and content. She glances at her phone briefly, slips it into her
      jacket pocket. Documentary realism.
    negative_prompt: "stock photo, staged pose"

  - spot: 3
    id: s3-shot6-family-evening
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      The same caregiver, now wearing casual clothes (no scrubs), picking up a 5-year-old child
      from a daycare. Warm hug. Normal afternoon. Naturalistic.
    negative_prompt: "staged pose, stock smile, overlit"

  # ----------------- Spot 4: Family -----------------

  - spot: 4
    id: s4-shot1-discharge
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      An older woman in her 70s being wheeled in a hospital wheelchair through hospital
      double-doors by a nurse, her adult daughter walking beside her carrying a small bag.
      Soft daytime hospital lighting. The daughter looks concerned but composed.
    negative_prompt: "dramatic crying, stock photo, melodrama"

  - spot: 4
    id: s4-shot2-daughter-desk
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      A mid-40s woman at a modern office desk glances at her smartphone with a soft expression
      of relief. Indirect daylight. Professional but warm. Naturalistic.
    negative_prompt: "fake smile, dramatic expression, stock photo"

  - spot: 4
    id: s4-shot3-notification
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Phone screen close-up: a notification card reads "Sarah arrived at 10:02 AM" with a small
      green map-pin icon next to it. Calming UI in light blues and white. No other notifications.
    negative_prompt: "garbled text, illegible UI"

  - spot: 4
    id: s4-shot4-notes
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Macro of a smartphone screen with handwritten-style typography showing visit notes in a
      warm, casual tone. Light background. Readable but not corporate.
    negative_prompt: "garbled text, illegible handwriting"

  - spot: 4
    id: s4-shot5-relief
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Same daughter from earlier shots, shoulders visibly relax, gives a small private smile,
      returns to her laptop. Subtle and quiet — no theatrics. Indirect daylight.
    negative_prompt: "happy-cry, fake smile, theatrical"

  - spot: 4
    id: s4-shot6-peaceful-home
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Wide shot, late afternoon — an elderly woman sits in a wooden chair near a sunlit window
      with a caregiver gently arranging a blanket over her lap. Peaceful, naturalistic, warm.
    negative_prompt: "staged pose, stock photo, overlit"

  # ----------------- Spot 5: Compliance -----------------

  - spot: 5
    id: s5-shot1-verified
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Macro close-up of a phone screen. A small green "Verified" tag appears over a map pin,
      then the screen transitions to show an audit log entry materializing. Deep navy
      background, white text. Crisp UI animation.
    negative_prompt: "garbled text, illegible UI, jumbled letters"

  - spot: 5
    id: s5-shot2-audit-pan
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Smooth slow horizontal pan across a dark-mode admin dashboard showing rows of audit log
      entries with timestamps in monospace font. Subtle vertical scroll. No hands.
    negative_prompt: "garbled text, jumbled fonts, oversaturated"

  # ----------------- Spot 6: Bumper -----------------

  - spot: 6
    id: s6-shot1-confident-owner
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      A confident woman in her 40s sits at a clean modern desk looking at her laptop with a
      small confident private smile. Soft natural daylight from a window. No theatrics.
    negative_prompt: "fake smile, stock photo, theatrical"

  - spot: 6
    id: s6-shot2-dashboard-animate
    duration_s: 5
    resolution: 1920x1080
    prompt: >
      Macro of an admin dashboard animating: a task card moves itself from an "incoming" column
      to a "resolved" column with a subtle slide animation. Clean light UI.
    negative_prompt: "garbled text, illegible UI"
